name: FinCore CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify Docker daemon for Testcontainers
        run: docker info

      - name: Step 1 - Compile and run unit tests
        run: mvn -B -Dtest='*Test' test

      - name: Step 2 - Run integration tests with Testcontainers
        run: mvn -B -Dtest='*IT' test

      - name: Step 3 - Run JaCoCo coverage check (min 75%)
        run: mvn -B clean test jacoco:report jacoco:check

      - name: Calculate coverage percentage
        id: coverage
        run: |
          COVERED=$(awk -F, 'NR>1{sum+=$5} END{print sum+0}' target/site/jacoco/jacoco.csv)
          MISSED=$(awk -F, 'NR>1{sum+=$4} END{print sum+0}' target/site/jacoco/jacoco.csv)
          TOTAL=$((COVERED + MISSED))
          if [ "$TOTAL" -eq 0 ]; then
            PCT="0.00"
          else
            PCT=$(awk -v c="$COVERED" -v t="$TOTAL" 'BEGIN { printf "%.2f", (c/t)*100 }')
          fi
          echo "coverage=$PCT" >> "$GITHUB_OUTPUT"

      - name: Step 4 - Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/fincore:${{ github.sha }} -t ${{ secrets.DOCKER_USERNAME }}/fincore:latest .

      - name: Step 5 - Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Step 5 - Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fincore:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/fincore:latest

      - name: Collect test summary
        id: tests
        if: always()
        run: |
          TOTAL=$(find target/surefire-reports -name '*.xml' -exec grep -h '<testsuite' {} \; | sed -n 's/.*tests="\([0-9]*\)".*/\1/p' | awk '{sum+=$1} END{print sum+0}')
          FAILURES=$(find target/surefire-reports -name '*.xml' -exec grep -h '<testsuite' {} \; | sed -n 's/.*failures="\([0-9]*\)".*/\1/p' | awk '{sum+=$1} END{print sum+0}')
          ERRORS=$(find target/surefire-reports -name '*.xml' -exec grep -h '<testsuite' {} \; | sed -n 's/.*errors="\([0-9]*\)".*/\1/p' | awk '{sum+=$1} END{print sum+0}')
          SKIPPED=$(find target/surefire-reports -name '*.xml' -exec grep -h '<testsuite' {} \; | sed -n 's/.*skipped="\([0-9]*\)".*/\1/p' | awk '{sum+=$1} END{print sum+0}')
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "failures=$FAILURES" >> "$GITHUB_OUTPUT"
          echo "errors=$ERRORS" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"

      - name: Step 6 - Comment PR with test and coverage summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## FinCore CI Result',
              `- Unit + Integration Tests: ${'${{ steps.tests.outputs.total }}'} total, ${'${{ steps.tests.outputs.failures }}'} failures, ${'${{ steps.tests.outputs.errors }}'} errors, ${'${{ steps.tests.outputs.skipped }}'} skipped`,
              `- JaCoCo Coverage: ${'${{ steps.coverage.outputs.coverage }}'}% (minimum required: 75%)`,
              `- Docker Image: \\`${'${{ secrets.DOCKER_USERNAME }}'}/fincore:${'${{ github.sha }}'}\\``
            ].join('\n');

            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number
            });

            const marker = '## FinCore CI Result';
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body
              });
            }
