server:
  port: 8080

spring:
  application:
    name: intelligent-banking-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/banking_db
    username: postgres
    password: [REDACTED_DB_PASSWORD]
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  redis:
    host: localhost
    port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    admin:
      fail-fast: false
      auto-create: false
    listener:
      missing-topics-fatal: false
    consumer:
      group-id: fincore-transaction-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        reconnect.backoff.ms: 5000
        reconnect.backoff.max.ms: 30000
        retry.backoff.ms: 5000
        spring:
          json:
            trusted:
              packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  mail:
    host: sandbox.smtp.mailtrap.io
    port: 587
    username: your_mailtrap_username
    password: your_mailtrap_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  cache:
    type: redis

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  health:
    mail:
      enabled: false
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: fincore
  tracing:
    enabled: false
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      enabled: false
      endpoint: http://localhost:9411/api/v2/spans

jwt:
  secret: "[REDACTED_JWT_SECRET]"
  expiration: 900000          # 15 minutes in milliseconds
  refresh-expiration: 604800000 # 7 days in milliseconds

security:
  cookie:
    secure: false
  lockout-duration-minutes: 15

app:
  kafka:
    transaction-topic: transaction-events
    transaction-dlt-topic: transaction-events-dlt
    account-topic: account-events
    failed-transaction-topic: failed-transaction-events
    consumer-groups:
      audit: audit-consumer-group
      notification: notification-consumer-group
      fraud: fraud-consumer-group
      dlt: transaction-dlt-consumer-group

  batch:
    statement:
      output-dir: /statements
    cron:
      monthly-statement: "0 0 8 1 * *"
      dormant-account: "0 0 0 * * SUN"
      failed-tx-cleanup: "0 0 * * * *"
  metrics:
    active-accounts-refresh-ms: 300000

logging:
  level:
    root: INFO
    org.apache.kafka.clients.NetworkClient: ERROR
    org.apache.kafka.clients.admin.KafkaAdminClient: ERROR
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.springframework.data.redis: WARN
    org.springframework.data.redis.repository.config: WARN

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
