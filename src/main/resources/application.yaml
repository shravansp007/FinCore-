server:
  port: 8080

spring:
  application:
    name: intelligent-banking-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/banking_db
    username: postgres
    password: [REDACTED_DB_PASSWORD]
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  redis:
    host: localhost
    port: 6379

  cache:
    type: redis

jwt:
  secret: "[REDACTED_JWT_SECRET]"
  expiration: 3600000   # 1 hour in milliseconds

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.springframework.data.redis: WARN
    org.springframework.data.redis.repository.config: WARN
